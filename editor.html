<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TerraRiff Chart Editor</title>
  <meta name="description" content="TerraRiff: Chart Editor" />

  <style>
    :root{
      --bg:#0b0b0f;
      --panel:rgba(18,18,26,.82);
      --text:#eaeaf2;
      --muted:#a7a7b6;
      --line:#232335;
      --accent:#6aa6ff;
      --shadow: rgba(0,0,0,.45);

      --container:1120px;
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* контейнер по центру */
    .container{
      max-width:var(--container);
      margin:0 auto;
      padding:14px 20px;
      width:100%;
    }

    /* верхняя панель */
    header{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(10px);
      background:rgba(11,11,15,.7);
      border-bottom:1px solid var(--line);
    }

    .head{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      max-width:var(--container);
      margin:0 auto;
      padding:14px 20px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 180px;
      cursor: pointer; /* это чтобы показать что кликабельно */
    }
    .brand h1{
      margin:0;
      font-size:14px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.6px;
      font-weight:900;
    }
    .brand small{ font-size:12px; color:var(--muted); }

    .headerActions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    /* общая карточка */
    .card{
      background:var(--panel);
      backdrop-filter: blur(10px);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow: 0 16px 40px var(--shadow);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
    }

    /* кнопки */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      border-radius:12px;

      border:1px solid var(--line);
      background:rgba(15,15,22,.6);

      color:var(--text);
      text-decoration:none;
      font-size:13px;
      white-space:nowrap;
      transition:.15s;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{ transform:translateY(-2px); filter:brightness(1.1); }
    .btn.primary{ border-color:var(--accent); }
    .btn:disabled,
    .btn.disabled{
      opacity:.55;
      cursor:not-allowed;
      pointer-events:none;
      transform:none;
      filter:none;
    }

    /* рабочая зона: слева настройки, справа канвас */
    main{
      width:100%;
      flex:1;
      min-height:0;
      max-width:var(--container);
      margin:0 auto;
      padding:18px 20px 20px;
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:16px;
      align-items:stretch;
    }

    /* типографика */
    h2{
      margin:0 0 2px 0;
      font-size:11px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.55px;
      font-weight:900;
    }

    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin:8px 0 6px;
    }

    /* инпуты */
    input[type="file"],
    input[type="number"],
    input[type="text"],
    select{
      width:100%;
      background:rgba(15,15,22,.6);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      outline:none;
    }

    input[type="range"]{ width:100%; }
    input[type="file"]{ padding:9px 10px; }

    input:focus, select:focus{
      outline:2px solid rgba(106,166,255,.55);
      outline-offset:2px;
    }

    .row{ display:flex; gap:10px; }
    .row > *{ flex:1; }

    .muted{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .kbd{
      display:inline-block;
      padding:2px 6px;
      border-radius:8px;
      border:1px solid var(--line);
      background:rgba(15,15,22,.6);
      color:var(--text);
      font-size:12px;
      margin:0 2px;
    }

    hr{
      border:none;
      border-top:1px solid rgba(35,35,53,.75);
      margin:8px 0;
    }

    /* верх канваса: скраб + инфа + аудио статус */
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:8px;
    }

    .toolbar .left{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      flex:1;
    }

    .toolbar input[type="range"]{ 
      width: min(260px, 100%);
      min-width: 160px;
    }

    .audio-status{
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:200px;
    }
    .audio-status strong{ color:var(--text); font-weight:650; }

    /* рамка под канвас */
    .stageShell{
      flex:1;
      min-height:0;
      border-radius:12px;
      border:1px solid var(--line);
      overflow:hidden;
      background:
        radial-gradient(900px 500px at 20% 0%, rgba(106,166,255,.10), transparent 60%),
        radial-gradient(700px 500px at 90% 20%, rgba(173,76,91,.08), transparent 55%),
        #07070b;
      display:flex;
      box-shadow: 0 12px 26px rgba(0,0,0,.35) inset;
    }

    #stage{
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      outline:none;
    }

    /* фокус на канвасе, чтобы было понятно что хоткеи активны */
    #stage:focus{
      outline:2px solid rgba(106,166,255,.6);
      outline-offset:-2px;
    }

    /* низ */
    footer{
      width:100%;
      border-top:1px solid var(--line);
      background:rgba(11,11,15,.45);
      backdrop-filter: blur(10px);
    }
    .footerRow{
      max-width:var(--container);
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
    }
    footer a{
      color:var(--muted);
      text-decoration:none;
    }
    footer a:hover{ text-decoration:underline; }

    /* статистика с проблемами */
    .stats-row{
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* модалка */
    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      backdrop-filter:blur(8px);
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      visibility:hidden;
      transition:opacity .2s, visibility .2s;
    }

    .modal-overlay.active{
      opacity:1;
      visibility:visible;
    }

    .modal{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 20px 60px var(--shadow);
      width:90%;
      max-width:500px;
      max-height:80vh;
      overflow-y:auto;
      padding:24px;
      position:relative;
    }

    .modal h2{
      margin:0 0 16px 0;
      font-size:16px;
      color:var(--text);
      text-transform:none;
      letter-spacing:normal;
    }

    .modal-close{
      position:absolute;
      top:16px;
      right:16px;
      background:none;
      border:none;
      color:var(--muted);
      font-size:20px;
      cursor:pointer;
      padding:4px 8px;
    }
    .modal-close:hover{ color:var(--text); }

    .modal-section{
      margin-bottom:20px;
      padding-bottom:16px;
      border-bottom:1px solid var(--line);
    }
    .modal-section:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }

    .modal .btn{
      width:100%;
      margin-top:8px;
    }

    /* сетка для хоткеев в модалке */
    .keybind-grid{
      display:grid;
      grid-template-columns:80px 1fr 1fr 1fr 1fr;
      gap:6px;
      align-items:center;
      margin:12px 0;
    }

    /* мобилка */
    @media (max-width: 900px){
      .head{ padding:14px 16px; }
      main{
        grid-template-columns:1fr;
        padding:16px;
      }
      .footerRow{ padding:14px 16px; }
      .toolbar input[type="range"]{ width:180px; }
      .audio-status{ max-width:120px; }
    }
  </style>
</head>

<body>
<header>
  <div class="head">
    <div class="brand" id="homeButton">
      <h1>TerraRiff</h1>
      <small>Chart Editor</small>
    </div>

    <div class="headerActions">
      <button id="settingsBtn" class="btn">⚙️ Settings</button>
      <button id="importBtn" class="btn">Import SONG.json</button>
      <button id="exportBtn" class="btn primary" disabled>Export SONG.json</button>
      <input id="importFile" type="file" accept=".json,application/json" style="display:none;">
    </div>
  </div>
</header>

<!-- модалка настроек -->
<div id="settingsModal" class="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="closeSettingsBtn">✕</button>
    
    <h2>Editor Settings</h2>

    <!-- формат экспорта -->
    <div class="modal-section">
      <label>Export Format</label>
      <select id="exportFormat">
        <option value="json">JSON file (song.json)</option>
        <option value="folder">Copy to TerraRiff/Songs/ folder</option>
      </select>
    </div>

    <!-- настройки клавиш -->
    <div class="modal-section">
      <label>Keybinds</label>
      <div class="keybind-grid">
        <span class="muted">Keys:</span>
        <button class="keybind-btn btn" data-lane="0" style="padding:8px;">Lane 1 (S)</button>
        <button class="keybind-btn btn" data-lane="1" style="padding:8px;">Lane 2 (D)</button>
        <button class="keybind-btn btn" data-lane="2" style="padding:8px;">Lane 3 (J)</button>
        <button class="keybind-btn btn" data-lane="3" style="padding:8px;">Lane 4 (K)</button>
      </div>
    </div>

    <!-- визуальные настройки -->
    <div class="modal-section">
      <label>Note Speed</label>
      <div style="display:grid; grid-template-columns:1fr 60px; gap:10px; align-items:center;">
        <input type="range" id="noteSpeed" min="300" max="800" value="520" step="10">
        <span id="speedValue" class="muted">520px/s</span>
      </div>

      <label style="margin-top:12px;">Scroll Direction</label>
      <select id="scrollDir">
        <option value="down">Downscroll (notes fall down)</option>
        <option value="up">Upscroll (notes rise up)</option>
      </select>

      <label style="margin-top:12px;">Mouse Wheel</label>
      <select id="wheelDir">
        <option value="normal" selected>Normal (scroll forward = time forward)</option>
        <option value="inverted">Inverted (like DAW)</option>
      </select>

      <label style="margin-top:12px;">Hitline Position</label>
      <input type="range" id="hitlinePos" min="0.2" max="0.9" value="0.78" step="0.01">
    </div>

    <!-- оффсет аудио -->
    <div class="modal-section">
      <label>Audio Offset (ms)</label>
      <div style="display:grid; grid-template-columns:1fr 60px; gap:10px; align-items:center;">
        <input type="range" id="audioOffset" min="-200" max="200" value="0" step="5">
        <span id="offsetValue" class="muted">0ms</span>
      </div>
    </div>

    <!-- экшон настроек -->
    <div class="modal-section" style="display:flex; gap:8px;">
      <button id="resetSettingsBtn" class="btn" style="flex:1;">Reset to Defaults</button>
      <button id="exportSettingsBtn" class="btn" style="flex:1;">Export</button>
      <button id="importSettingsBtn" class="btn" style="flex:1;">Import</button>
    </div>
  </div>
</div>

<main>
  <section class="card">
    <h2>Song Settings</h2>

    <label>Track (MP3, OGG, FLAC, WAV, M4A, AAC, WMA)</label>
    <input id="audioFile" type="file" accept=".mp3,.ogg,.flac,.wav,.m4a,.aac,.wma,audio/*">

    <div class="row">
      <div>
        <label>Title</label>
        <input id="title" type="text" placeholder="Song title...">
      </div>
      <div>
        <label>Artist (song author)</label>
        <input id="artist" type="text" placeholder="Artist...">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Difficulty (1-10)</label>
        <input id="difficulty" type="number" step="1" min="1" max="10" value="3">
      </div>
      <div>
        <label>Lead-in (sec)</label>
        <input id="leadIn" type="number" step="0.01" min="0" value="1.00">
      </div>
    </div>

    <div class="row">
      <div>
        <label>BPM (for snap)</label>
        <input id="bpm" type="number" step="0.01" min="1" placeholder="e.g. 120">
      </div>
      <div>
        <label>Snap</label>
        <select id="snap">
          <option value="off">Off</option>
          <option value="1/4">1/4</option>
          <option value="1/8">1/8</option>
          <option value="1/16">1/16</option>
        </select>
      </div>
    </div>

    <!-- скорость аудио -->
    <label>Play Speed</label>
    <select id="playSpeed">
      <option value="0.5">0.5x</option>
      <option value="0.75">0.75x</option>
      <option value="1" selected>1.0x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2.0x</option>
    </select>

    <div class="row" style="margin-top:10px;">
      <button id="playBtn" class="btn" disabled>Play / Pause</button>
      <button id="stopBtn" class="btn" disabled>Stop</button>
    </div>

    <hr>

    <h2>Chart</h2>
    <div class="stats-row">
      <span class="muted" id="chartStats">Notes: 0 • Sustains: 0</span>
      <span class="muted" id="problemCount" style="color: #ff6a6a;">⚠ 0 issues</span>
    </div>

    <div class="row">
      <button id="clearBtn" class="btn" disabled>Clear notes</button>
      <button id="quantizeBtn" class="btn" disabled>Quantize</button>
    </div>

    <!-- клавиши управления -->
    <hr>
    <h2>Hotkeys</h2>
    <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:12px;">
      <div><span class="kbd" id="hotkeyLane0">S</span><span class="kbd" id="hotkeyLane1">D</span><span class="kbd" id="hotkeyLane2">J</span><span class="kbd" id="hotkeyLane3">K</span> + <span class="kbd">LMB</span> place notes</div>
      <div><span class="kbd">RMB</span> delete note</div>
      <div><span class="kbd">Space</span> play/pause</div>
      <div><span class="kbd">Ctrl+Z</span> undo</div>
      <div><span class="kbd">Ctrl+Y</span> redo</div>
      <div><span class="kbd">← →</span> / <span class="kbd">Wheel</span> scrub</div>
    </div>
  </section>

  <section class="card">
    <div class="toolbar">
      <div class="left">
        <span class="muted">Scrub</span>
        <input id="scrub" type="range" min="0" max="1" step="0.001" value="0" disabled>
        <span id="timeLabel" class="muted">0.000s</span>
        <span class="audio-status" id="audioStatus">not loaded</span>
      </div>
      <div class="right"></div>
    </div>

    <div class="stageShell">
      <canvas id="stage"></canvas>
    </div>
  </section>
</main>

<footer>
  <div class="footerRow">
    <div>Made by Wurper</div>
    <div>TerraRiff • Editor • v0.6</div>
  </div>
</footer>

<script>
(() => {
  const LANES = 4;
  // это будет меняться через настройки
  let LANE_CODES = ["KeyS", "KeyD", "KeyJ", "KeyK"];

  let HITLINE_Y_FRAC = 0.78;
  let SCROLL_SPEED_PX_PER_SEC = 520;
  let SCROLL_DIRECTION = 1; // 1 = вниз, -1 = вверх
  
  const PAD = 18;

  const HOLD_TAP_THRESHOLD = 0.180;   // короче = тап, дольше = сустейн
  const DELETE_RADIUS_SEC = 0.09;     // окно по времени при клике для удаления

  // чисто визуальные константы предпросмотра
  const NOTE_SIZE_PX = 40;

  const LANE_COLORS = [
    { r:0xAB, g:0x95, b:0x4B }, // S
    { r:0x4B, g:0x6D, b:0xAB }, // D
    { r:0x4C, g:0xAF, b:0x50 }, // J
    { r:0xAD, g:0x4C, b:0x5B }  // K
  ];

  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d");

  const audioFile = document.getElementById("audioFile");
  const playBtn = document.getElementById("playBtn");
  const stopBtn = document.getElementById("stopBtn");
  const exportBtn = document.getElementById("exportBtn");
  const clearBtn = document.getElementById("clearBtn");
  const quantizeBtn = document.getElementById("quantizeBtn");
  const scrub = document.getElementById("scrub");
  const timeLabel = document.getElementById("timeLabel");
  const bpmInput = document.getElementById("bpm");
  const snapSel = document.getElementById("snap");
  const audioStatus = document.getElementById("audioStatus");
  const chartStats = document.getElementById("chartStats");
  const problemCount = document.getElementById("problemCount");
  const playSpeed = document.getElementById("playSpeed");

  const titleInput = document.getElementById("title");
  const artistInput = document.getElementById("artist");
  const difficultyInput = document.getElementById("difficulty");
  const leadInInput = document.getElementById("leadIn");

  const importBtn = document.getElementById("importBtn");
  const importFile = document.getElementById("importFile");
  const homeButton = document.getElementById("homeButton");
  const settingsBtn = document.getElementById("settingsBtn");
  const settingsModal = document.getElementById("settingsModal");
  const closeSettingsBtn = document.getElementById("closeSettingsBtn");
  const exportFormat = document.getElementById("exportFormat");

  let audioCtx = null;
  let audioBuffer = null;
  let sourceNode = null;

  // тайминги воспроизведения
  let startedAt = 0;     // audioCtx.currentTime в момент старта
  let pausedAt = 0;      // позиция трека (сек), когда стоим/пауза
  let isPlaying = false;

  // ноты: { time, lane, duration }
  let notes = [];
  let undoStack = [];
  let redoStack = [];

  // для сустейнов и подсветки колец на хитлайне
  let holdStart = Array(LANES).fill(null);
  let keyDown = Array(LANES).fill(false);

  // постановка мышью
  let mousePlace = {
    active:false,
    lane:-1,
    t0:0,
    t1:0
  };

  // хоткеи только когда канвас в фокусе
  let editorActive = false;
  canvas.tabIndex = 0;

  // настройки редактора
  let editorSettings = {
    keybinds: ['KeyS', 'KeyD', 'KeyJ', 'KeyK'],
    noteSpeed: 520,
    scrollDirection: 'down',
    wheelDirection: 'normal', // normal по умолчанию
    hitlinePos: 0.78,
    audioOffset: 0
  };

  let listeningForLane = -1;
  let hasChanges = false;
  let autoSaveTimer;

  function isTypingNow(){
    const el = document.activeElement;
    if (!el) return false;

    const tag = (el.tagName || "").toLowerCase();
    return tag === "input" || tag === "textarea" || tag === "select" || el.isContentEditable;
  }

  canvas.addEventListener("focus", () => {
    editorActive = true;
  });

  canvas.addEventListener("blur", () => {
    editorActive = false;

    // на выходе из фокуса сбрасываем "залипшие" состояния
    for (let i = 0; i < LANES; i++){
      keyDown[i] = false;
      holdStart[i] = null;
    }
    mousePlace.active = false;
  });

  // клик по канвасу = забрать фокус (и хоткеи)
  canvas.addEventListener("pointerdown", () => {
    canvas.focus();
  });

  // если окно потеряло фокус, тоже сбрасываем
  window.addEventListener("blur", () => {
    for (let i = 0; i < LANES; i++){
      keyDown[i] = false;
      holdStart[i] = null;
    }
    mousePlace.active = false;
  });

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function ensureAudioCtx(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function getDuration(){
    return audioBuffer ? audioBuffer.duration : 0;
  }

  function getTrackTime(){
    if (!audioCtx) return 0;
    if (!isPlaying) return pausedAt;
    return (audioCtx.currentTime - startedAt) * getPlaySpeed() + pausedAt;
  }

  function getPlaySpeed(){
    return parseFloat(playSpeed.value) || 1;
  }

  function setTrackTime(t){
    const dur = getDuration();
    const clamped = Math.max(0, Math.min(t, dur));
    pausedAt = clamped;

    if (isPlaying){
      stopPlayback(true);
      startPlayback();
    }

    updateScrubUI();
  }

  function getSnapStep(){
    const mode = snapSel.value;
    if (mode === "off") return 0;

    const bpm = parseFloat(bpmInput.value);
    if (!isFinite(bpm) || bpm <= 0) return 0;

    const beat = 60 / bpm;
    if (mode === "1/4") return beat;
    if (mode === "1/8") return beat / 2;
    if (mode === "1/16") return beat / 4;
    return 0;
  }

  function snapTime(t){
    const step = getSnapStep();
    if (step <= 0) return t;
    return Math.round(t / step) * step;
  }

  function round3(x){
    return Math.round(x * 1000) / 1000;
  }

  // координаты -> (lane, time)
  function pickLaneAndTime(mx, my){
    const rect = canvas.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;

    const fieldX = PAD;
    const fieldY = PAD;
    const fieldW = w - PAD * 2;
    const fieldH = h - PAD * 2;

    const laneW = fieldW / LANES;
    const hitY = fieldY + fieldH * HITLINE_Y_FRAC;

    const lane = Math.floor((mx - fieldX) / laneW);
    if (lane < 0 || lane >= LANES) return null;

    const t = getTrackTime();
    const speed = SCROLL_SPEED_PX_PER_SEC;
    // учитываем направление скролла при расчете времени
    const timeGuess = t + (hitY - my) / speed * SCROLL_DIRECTION;

    return { lane, time: timeGuess, fieldX, fieldY, fieldW, fieldH, laneW, hitY };
  }

  // undo/redo: храним снепшоты notes
  function pushUndo(){
    undoStack.push(JSON.stringify(notes));
    if (undoStack.length > 200) undoStack.shift();
    redoStack.length = 0;
    markChanges();
  }

  function undo(){
    if (undoStack.length === 0) return;
    redoStack.push(JSON.stringify(notes));
    notes = JSON.parse(undoStack.pop());
    updateStatsUI();
    markChanges();
  }

  function redo(){
    if (redoStack.length === 0) return;
    undoStack.push(JSON.stringify(notes));
    notes = JSON.parse(redoStack.pop());
    updateStatsUI();
    markChanges();
  }

  function enableControls(ready){
    playBtn.disabled = !ready;
    stopBtn.disabled = !ready;
    exportBtn.disabled = !ready;
    clearBtn.disabled = !ready;
    quantizeBtn.disabled = !ready;
    scrub.disabled = !ready;
  }

  async function loadAudio(file){
    ensureAudioCtx();

    const arr = await file.arrayBuffer();
    
    // пробуем декодировать как есть
    try {
      audioBuffer = await audioCtx.decodeAudioData(arr);
    } catch (e) {
      alert("Couldn't decode audio. Try another file format.");
      return;
    }

    pausedAt = 0;
    isPlaying = false;
    sourceNode = null;
    startedAt = 0;

    audioStatus.innerHTML = `<strong>${file.name}</strong> (${audioBuffer.duration.toFixed(2)}s)`;

    enableControls(true);

    scrub.max = audioBuffer.duration.toString();
    scrub.value = "0";
    timeLabel.textContent = "0.000s";

    if (!titleInput.value.trim()){
      titleInput.value = file.name.replace(/\.[^.]+$/, "");
    }

    updateStatsUI();
  }

  function startPlayback(){
    if (!audioCtx || !audioBuffer) return;
    if (isPlaying) return;

    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.playbackRate.value = getPlaySpeed();
    sourceNode.connect(audioCtx.destination);

    startedAt = audioCtx.currentTime;
    sourceNode.start(0, pausedAt);

    isPlaying = true;

    sourceNode.onended = () => {
      if (!isPlaying) return;
      stopPlayback(false);
      setTrackTime(getDuration());
    };
  }

  function stopPlayback(keepTime){
    if (!audioCtx) return;

    if (sourceNode){
      try { sourceNode.onended = null; sourceNode.stop(); } catch {}
      try { sourceNode.disconnect(); } catch {}
      sourceNode = null;
    }

    if (isPlaying){
      const t = getTrackTime();
      isPlaying = false;
      if (!keepTime) pausedAt = t;
    }
  }

  function togglePlay(){
    if (!audioBuffer) return;
    ensureAudioCtx();
    if (audioCtx.state === "suspended") audioCtx.resume();

    if (isPlaying) stopPlayback(false);
    else startPlayback();
  }

  function sortNotes(){
    notes.sort((a, b) => (a.time === b.time ? a.lane - b.lane : a.time - b.time));
    updateStatsUI();
  }

  function addTap(lane, t){
    pushUndo();
    notes.push({ time: round3(snapTime(t)), lane, duration: 0 });
    sortNotes();
  }

  function addHold(lane, tStart, tEnd){
    const a = snapTime(Math.min(tStart, tEnd));
    const b = snapTime(Math.max(tStart, tEnd));
    const dur = Math.max(0, b - a);

    pushUndo();
    notes.push({ time: round3(a), lane, duration: round3(dur) });
    sortNotes();
  }

  function deleteNearestNoteAt(lane, t, radiusSec){
    let bestI = -1;
    let bestAbs = Infinity;

    for (let i = 0; i < notes.length; i++){
      const n = notes[i];
      if (n.lane !== lane) continue;

      const abs = Math.abs(n.time - t);
      if (abs <= radiusSec && abs < bestAbs){
        bestAbs = abs;
        bestI = i;
      }
    }

    if (bestI === -1) return false;

    pushUndo();
    notes.splice(bestI, 1);
    updateStatsUI();
    return true;
  }

  function slugify(s){
    return (s || "")
      .toLowerCase()
      .trim()
      .replace(/['"]/g, "")
      .replace(/[^a-z0-9а-яё]+/gi, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 48) || "song";
  }

  function getAudioFileName(){
    const f = audioFile.files && audioFile.files[0];
    return f ? f.name : "";
  }

  // поиск проблемных нот (пересечения и дубликаты)
  function findProblemNotes(){
    const problems = [];
    const TOLERANCE = 0.010; // 10ms допуск для определения "одинакового времени"
    
    // группируем по лейнам
    const byLane = [[], [], [], []];
    
    notes.forEach((n, idx) => {
      if (n.lane >= 0 && n.lane < 4) byLane[n.lane].push({ ...n, originalIndex: idx });
    });
    
    // проверяем каждый лейн
    byLane.forEach((laneNotes, lane) => {
      // сортируем по времени
      laneNotes.sort((a, b) => a.time - b.time);
      
      for (let i = 0; i < laneNotes.length; i++) {
        const current = laneNotes[i];
        
        // проверяем пересечения с следующей нотой
        if (i < laneNotes.length - 1) {
          const next = laneNotes[i + 1];
          const currentEnd = current.time + (current.duration || 0);
          
          // если конец текущей ноты позже начала следующей (с учетом допуска)
          if (currentEnd > next.time + TOLERANCE) {
            problems.push({
              note1: current,
              note2: next,
              lane,
              type: 'overlap',
              message: 'Overlapping notes'
            });
          }
        }
        
        // проверяем дубликаты (ноты с очень близким временем)
        for (let j = i + 1; j < laneNotes.length; j++) {
          const other = laneNotes[j];
          const timeDiff = Math.abs(other.time - current.time);
          
          // если разница во времени меньше допуска - это дубликат
          if (timeDiff < TOLERANCE) {
            problems.push({
              note1: current,
              note2: other,
              lane,
              type: 'duplicate',
              message: 'Duplicate notes'
            });
          } else {
            // так как массив отсортирован, дальше можно не проверять
            break;
          }
        }
      }
    });
    
    // убираем дубликаты проблем (чтобы дважды не показывать одну и ту же пару)
    const uniqueProblems = [];
    const seen = new Set();
    
    problems.forEach(p => {
      const id1 = `${p.note1.originalIndex}-${p.note2.originalIndex}`;
      const id2 = `${p.note2.originalIndex}-${p.note1.originalIndex}`;
      
      if (!seen.has(id1) && !seen.has(id2)) {
        seen.add(id1);
        uniqueProblems.push(p);
      }
    });
    
    problemCount.textContent = `⚠ ${uniqueProblems.length} issues`;
    return uniqueProblems;
  }

  // экспорт в папку игры
  async function copyToGameFolder(){
    const payload = generateSongJson();
    const songId = payload.meta.id;
    
    // пытаемся найти папку Terraria
    const terrariaPath = await findTerrariaPath();
    
    if (terrariaPath) {
      const songsFolder = `${terrariaPath}/TerraRiff/Songs/${songId}`;
      alert(`Create folder:\n${songsFolder}\n\nAnd place these files there:\n- song.json\n- ${getAudioFileName()}`);
    }
    
    // все равно скачиваем json
    const songJson = JSON.stringify(payload, null, 2);
    const blob = new Blob([songJson], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = 'song.json';
    a.click();
    
    URL.revokeObjectURL(url);
  }

  async function findTerrariaPath(){
    // это примерные пути, в реальности можно дать пользователю выбрать
    const paths = [
      `${process.env.USERPROFILE}/Documents/My Games/Terraria/tModLoader`,
      `${process.env.HOME}/.local/share/Terraria/tModLoader`,
      `${process.env.HOME}/Library/Application Support/Terraria/tModLoader`
    ];
    
    // пока просто возвращаем первый вариант
    return paths[0];
  }

  function generateSongJson(){
    sortNotes();

    const titleVal = titleInput.value.trim();
    const artistVal = artistInput.value.trim();

    const bpmVal = parseFloat(bpmInput.value);
    const bpmOut = (isFinite(bpmVal) && bpmVal > 0) ? bpmVal : 0;

    const diffVal = parseInt(difficultyInput.value, 10);
    const diffOut = (isFinite(diffVal) && diffVal > 0) ? diffVal : 0;

    const leadInVal = Math.max(0, parseFloat(leadInInput.value) || 0);

    const audioName = getAudioFileName();
    const baseName = audioName ? audioName.replace(/\.[^.]+$/, "") : "";
    const id = slugify(titleVal || baseName || "song");

    return {
      meta: {
        id,
        title: titleVal || id,
        artist: artistVal || "-",
        difficulty: diffOut,
        bpm: bpmOut,
        leadIn: round3(leadInVal),
        length: round3(getDuration() || 0),
        audio: audioName || ""
      },
      chart: {
        notes: notes.map(n => {
          const out = { time: round3(n.time), lane: n.lane };
          if (n.duration && n.duration > 0) out.duration = round3(n.duration);
          return out;
        })
      }
    };
  }

  function exportSongJson(){
    const format = exportFormat.value;
    
    if (format === 'folder') {
      copyToGameFolder();
    } else {
      const payload = generateSongJson();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `song.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  }

  function importSongJsonText(text){
    let data;
    try { data = JSON.parse(text); }
    catch { return alert("JSON parse error"); }

    if (!data) return alert("Bad JSON");

    let meta = null;
    let noteArr = null;

    if (data.chart && Array.isArray(data.chart.notes)){
      meta = data.meta || null;
      noteArr = data.chart.notes;
    } else if (Array.isArray(data.notes)){
      noteArr = data.notes;
    } else {
      return alert("Bad JSON: expected { meta, chart:{notes:[...] } } or { notes:[...] }");
    }

    if (meta){
      if (meta.title != null) titleInput.value = String(meta.title);
      if (meta.artist != null) artistInput.value = String(meta.artist);
      if (meta.bpm != null) bpmInput.value = String(meta.bpm);
      if (meta.difficulty != null) difficultyInput.value = String(meta.difficulty);
      if (meta.leadIn != null) leadInInput.value = String(meta.leadIn);
    }

    const arr = [];
    for (const n of noteArr){
      if (!n) continue;

      const time = Number(n.time);
      const lane = Number(n.lane);
      const duration = Number(n.duration || 0);

      if (!isFinite(time) || !isFinite(lane)) continue;
      if (lane < 0 || lane >= LANES) continue;

      arr.push({
        time: round3(time),
        lane,
        duration: round3(Math.max(0, duration))
      });
    }

    pushUndo();
    notes = arr;
    sortNotes();
  }

  function updateScrubUI(){
    if (!audioBuffer){
      scrub.value = "0";
      timeLabel.textContent = "0.000s";
      return;
    }

    const t = getTrackTime();
    scrub.value = String(t);
    timeLabel.textContent = `${t.toFixed(3)}s`;
  }

  function updateStatsUI(){
    const sustains = notes.filter(n => n.duration > 0).length;
    chartStats.textContent = `Notes: ${notes.length} • Sustains: ${sustains}`;
    findProblemNotes();
  }

  function drawSnapGrid(fieldX, fieldY, fieldW, fieldH, hitY, t){
    const step = getSnapStep();
    if (step <= 0) return;

    const speed = SCROLL_SPEED_PX_PER_SEC * SCROLL_DIRECTION;

    // видимый диапазон времени (примерно)
    const tTop = t + (hitY - fieldY) / speed;
    const tBot = t + (hitY - (fieldY + fieldH)) / speed;
    const tMin = Math.min(tTop, tBot) - step * 2;
    const tMax = Math.max(tTop, tBot) + step * 2;

    let k = Math.floor(tMin / step);
    let guard = 0;

    ctx.save();
    ctx.beginPath();
    ctx.rect(fieldX, fieldY, fieldW, fieldH);
    ctx.clip();

    while (k * step <= tMax && guard++ < 10000){
      const tt = k * step;
      const y = hitY - (tt - t) * speed;

      const beat = 60 / (parseFloat(bpmInput.value) || 120);
      const isBeat = beat > 0 ? (Math.abs((tt / beat) - Math.round(tt / beat)) < 1e-6) : false;

      ctx.strokeStyle = isBeat ? "rgba(255,255,255,0.10)" : "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(fieldX + 1, y);
      ctx.lineTo(fieldX + fieldW - 1, y);
      ctx.stroke();

      k++;
    }

    ctx.restore();
  }

  function draw(){
    const rect = canvas.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;

    ctx.clearRect(0, 0, w, h);

    const fieldX = PAD;
    const fieldY = PAD;
    const fieldW = w - PAD * 2;
    const fieldH = h - PAD * 2;

    // фон канваса
    ctx.fillStyle = "#0b0b12";
    ctx.fillRect(0, 0, w, h);

    // рабочее поле
    ctx.fillStyle = "rgba(20,20,30,0.92)";
    roundRect(ctx, fieldX, fieldY, fieldW, fieldH, 10);
    ctx.fill();

    const laneW = fieldW / LANES;
    const hitY = fieldY + fieldH * HITLINE_Y_FRAC;

    // полосы по лейнам
    for (let i = 0; i < LANES; i++){
      ctx.fillStyle = "rgba(30,30,45,0.75)";
      ctx.fillRect(fieldX + i * laneW + 1, fieldY + 1, laneW - 2, fieldH - 2);
    }

    const t = getTrackTime();
    const speed = SCROLL_SPEED_PX_PER_SEC * SCROLL_DIRECTION;
    const noteSize = NOTE_SIZE_PX;

    // сетка по snap
    drawSnapGrid(fieldX, fieldY, fieldW, fieldH, hitY, t);

    // кольца на хитлайне (фидбек по нажатию)
    for (let i = 0; i < LANES; i++){
      const cx = fieldX + i * laneW + laneW / 2;
      const down = keyDown[i] === true;
      const y = hitY + (down ? 1 : 0);
      const ringSize = Math.min(laneW - 8, noteSize + 12);
      drawRing(cx, y, ringSize / 2, down ? "rgba(180,180,180,1)" : "rgba(255,255,255,1)", 3);
    }

    // сустейн предпросмотра (мышь)
    if (mousePlace.active && mousePlace.lane >= 0){
      const lane = mousePlace.lane | 0;
      const cx = fieldX + lane * laneW + laneW / 2;

      const a = snapTime(Math.min(mousePlace.t0, mousePlace.t1));
      const b = snapTime(Math.max(mousePlace.t0, mousePlace.t1));

      const headY = hitY - (a - t) * speed;
      const tailY = hitY - (b - t) * speed;

      const top = Math.min(headY, tailY);
      const bot = Math.max(headY, tailY);

      const bodyW = Math.max(6, noteSize / 3);
      const c = LANE_COLORS[lane];

      ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.35)`;
      ctx.fillRect(cx - bodyW / 2, top, bodyW, Math.max(1, bot - top));

      drawFilledCircle(cx, headY, noteSize / 2, `rgba(${c.r},${c.g},${c.b},0.55)`);
      drawRing(cx, headY, (noteSize / 2) + 3, "rgba(255,255,255,0.45)", 3);
    }

    // сустейны (тела)
    for (const n of notes){
      if (n.duration <= 0) continue;

      const lane = n.lane | 0;
      const cx = fieldX + lane * laneW + laneW / 2;

      const headY = hitY - (n.time - t) * speed;
      const tailY = hitY - ((n.time + n.duration) - t) * speed;

      const top = Math.min(headY, tailY);
      const bot = Math.max(headY, tailY);

      if (bot < fieldY - 140 || top > fieldY + fieldH + 140) continue;

      const bodyW = Math.max(6, noteSize / 3);
      const c = LANE_COLORS[lane];
      ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.75)`;
      ctx.fillRect(cx - bodyW / 2, top, bodyW, Math.max(1, bot - top));
    }

    // головы нот
    for (const n of notes){
      const lane = n.lane | 0;
      const cx = fieldX + lane * laneW + laneW / 2;
      const y = hitY - (n.time - t) * speed;

      if (y < fieldY - 140 || y > fieldY + fieldH + 140) continue;

      const c = LANE_COLORS[lane];
      drawFilledCircle(cx, y, noteSize / 2, `rgb(${c.r},${c.g},${c.b})`);
      drawRing(cx, y, (noteSize / 2) + 3, "rgba(255,255,255,0.92)", 3);
    }

    // подсветка проблемных нот (только красные)
    if (editorActive && notes.length > 0) {
      const problems = findProblemNotes();
      
      problems.forEach(p => {
        const lane = p.note1.lane;
        const cx = fieldX + lane * laneW + laneW / 2;
        const y1 = hitY - (p.note1.time - t) * speed;
        const y2 = hitY - (p.note2.time - t) * speed;
        
        ctx.fillStyle = "rgba(255, 60, 60, 0.9)";
        ctx.font = "bold 20px system-ui";
        ctx.fillText("⚠", cx - 10, (y1 + y2) / 2 - 10);
      });
    }

    // подсказка букв у хитлайна (кастомные из настроек)
    ctx.fillStyle = "rgba(220,220,235,0.75)";
    ctx.font = "12px system-ui, Segoe UI, Roboto, Arial";
    
    const keyNames = editorSettings.keybinds.map(code => {
      if (code === 'KeyS') return 'S';
      if (code === 'KeyD') return 'D';
      if (code === 'KeyJ') return 'J';
      if (code === 'KeyK') return 'K';
      return code.replace('Key', '').replace('Digit', '');
    });

    for (let i = 0; i < LANES; i++) {
      ctx.fillText(keyNames[i], fieldX + laneW * i + 12, hitY + 24);
    }

    // хитлайн
    ctx.strokeStyle = "rgba(240,240,255,0.25)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(fieldX, hitY);
    ctx.lineTo(fieldX + fieldW, hitY);
    ctx.stroke();

    updateScrubUI();
    requestAnimationFrame(draw);
  }

  function drawFilledCircle(x, y, r, color){
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawRing(x, y, r, color, thickness){
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = thickness;
    ctx.stroke();
  }

  function roundRect(ctx2, x, y, w, h, r){
    ctx2.beginPath();
    ctx2.moveTo(x + r, y);
    ctx2.arcTo(x + w, y, x + w, y + h, r);
    ctx2.arcTo(x + w, y + h, x, y + h, r);
    ctx2.arcTo(x, y + h, x, y, r);
    ctx2.arcTo(x, y, x + w, y, r);
    ctx2.closePath();
  }

  // настройки настроечкииии

  function loadSettings(){
    try {
      const saved = localStorage.getItem('terrariff_editor_settings');
      if (saved) {
        const parsed = JSON.parse(saved);
        editorSettings = { ...editorSettings, ...parsed };
        updateSettingsUI();
      }
    } catch (e) {
      console.warn('Failed to load settings:', e);
    }
  }

  function saveSettings(){
    try {
      localStorage.setItem('terrariff_editor_settings', JSON.stringify(editorSettings));
      applySettings();
    } catch (e) {
      console.warn('Failed to save settings:', e);
    }
  }

  function updateSettingsUI(){
    // кнопки
    document.querySelectorAll('.keybind-btn').forEach(btn => {
      const lane = parseInt(btn.dataset.lane);
      const key = editorSettings.keybinds[lane];
      
      let keyName = key.replace('Key', '');
      if (key === 'KeyS') keyName = 'S';
      if (key === 'KeyD') keyName = 'D';
      if (key === 'KeyJ') keyName = 'J';
      if (key === 'KeyK') keyName = 'K';
      
      btn.textContent = `Lane ${lane + 1} (${keyName})`;
    });

    // обновляем хоткеи в подсказке
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`hotkeyLane${i}`);
      if (el) {
        const key = editorSettings.keybinds[i];
        let keyName = key.replace('Key', '');
        if (key === 'KeyS') keyName = 'S';
        if (key === 'KeyD') keyName = 'D';
        if (key === 'KeyJ') keyName = 'J';
        if (key === 'KeyK') keyName = 'K';
        el.textContent = keyName;
      }
    }
    
    // скорость нот
    const speedSlider = document.getElementById('noteSpeed');
    if (speedSlider) {
      speedSlider.value = editorSettings.noteSpeed;
      document.getElementById('speedValue').textContent = `${editorSettings.noteSpeed}px/s`;
    }
    
    // направление нот
    const scrollSelect = document.getElementById('scrollDir');
    if (scrollSelect) {
      scrollSelect.value = editorSettings.scrollDirection;
    }
    
    // направление колеса мыши
    const wheelSelect = document.getElementById('wheelDir');
    if (wheelSelect) {
      wheelSelect.value = editorSettings.wheelDirection;
    }
    
    // оффсет аудио
    const offsetSlider = document.getElementById('audioOffset');
    if (offsetSlider) {
      offsetSlider.value = editorSettings.audioOffset;
      document.getElementById('offsetValue').textContent = `${editorSettings.audioOffset}ms`;
    }
    
    // позиция хитлайна
    const hitlineSlider = document.getElementById('hitlinePos');
    if (hitlineSlider) {
      hitlineSlider.value = editorSettings.hitlinePos;
    }
    
    applySettings();
  }

  function applySettings(){
    LANE_CODES = editorSettings.keybinds;
    SCROLL_SPEED_PX_PER_SEC = editorSettings.noteSpeed;
    
    // устанавливаем направление скролла
    SCROLL_DIRECTION = editorSettings.scrollDirection === 'up' ? -1 : 1;
    
    HITLINE_Y_FRAC = editorSettings.scrollDirection === 'up' 
      ? 1 - editorSettings.hitlinePos 
      : editorSettings.hitlinePos;
    
    canvas.focus();
  }

  function markChanges(){
    hasChanges = true;
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(autoSaveProject, 2000);
  }

  function autoSaveProject(){
    if (!hasChanges) return;
    
    const project = {
      notes,
      meta: {
        title: titleInput.value,
        artist: artistInput.value,
        difficulty: difficultyInput.value,
        bpm: bpmInput.value,
        leadIn: leadInInput.value
      },
      settings: editorSettings,
      audioFile: audioFile.files?.[0]?.name
    };
    
    localStorage.setItem('terrariff_autosave', JSON.stringify(project));
    hasChanges = false;
    
    // показываем индикатор сохранения в аудио статусе
    const originalText = audioStatus.innerHTML;
    audioStatus.innerHTML = '💾 Saved';
    setTimeout(() => {
      audioStatus.innerHTML = originalText;
    }, 1000);
  }

  function loadAutoSave(){
    try {
      const saved = localStorage.getItem('terrariff_autosave');
      if (saved) {
        const project = JSON.parse(saved);
        if (confirm('Auto-saved project found. Load it?')) {
          notes = project.notes || [];
          if (project.meta) {
            titleInput.value = project.meta.title || '';
            artistInput.value = project.meta.artist || '';
            difficultyInput.value = project.meta.difficulty || '3';
            bpmInput.value = project.meta.bpm || '';
            leadInInput.value = project.meta.leadIn || '1.00';
          }
          if (project.settings) {
            editorSettings = { ...editorSettings, ...project.settings };
            updateSettingsUI();
          }
          sortNotes();
        }
      }
    } catch (e) {
      console.warn('Failed to load autosave:', e);
    }
  }

  // обработчики событий

  document.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    if (isTypingNow()) return;
    if (!editorActive) return;

    const code = e.code;
    const ctrl = e.ctrlKey || e.metaKey;

    if (code === "Space"){
      e.preventDefault();
      togglePlay();
      return;
    }

    if (ctrl && code === "KeyZ"){
      e.preventDefault();
      undo();
      return;
    }

    if (ctrl && code === "KeyY"){
      e.preventDefault();
      redo();
      return;
    }

    // стрелки влево-вправо на 5 секунд
    if (code === "ArrowLeft") {
      e.preventDefault();
      const t = getTrackTime();
      setTrackTime(t - 5);
      return;
    }

    if (code === "ArrowRight") {
      e.preventDefault();
      const t = getTrackTime();
      setTrackTime(t + 5);
      return;
    }

    const lane = LANE_CODES.indexOf(code);
    if (lane === -1) return;

    e.preventDefault();
    keyDown[lane] = true;
    if (!audioBuffer) return;

    holdStart[lane] = getTrackTime();
  }, true);

  document.addEventListener("keyup", (e) => {
    if (isTypingNow()) return;
    if (!editorActive) return;

    const lane = LANE_CODES.indexOf(e.code);
    if (lane === -1) return;

    e.preventDefault();
    keyDown[lane] = false;
    if (!audioBuffer) return;

    const t0 = holdStart[lane];
    holdStart[lane] = null;
    if (t0 == null) return;

    const t1 = getTrackTime();
    const dur = Math.max(0, t1 - t0);

    if (dur < HOLD_TAP_THRESHOLD) addTap(lane, t0);
    else addHold(lane, t0, t1);
  }, true);

  canvas.addEventListener("contextmenu", (e) => e.preventDefault());

  canvas.addEventListener("pointerdown", (e) => {
    if (!audioBuffer) return;
    if (!editorActive) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const pick = pickLaneAndTime(mx, my);
    if (!pick) return;

    if (e.button === 2){
      const tGuess = pick.time;
      if (deleteNearestNoteAt(pick.lane, tGuess, DELETE_RADIUS_SEC)) sortNotes();
      return;
    }

    if (e.button === 0){
      mousePlace.active = true;
      mousePlace.lane = pick.lane;
      mousePlace.t0 = pick.time;
      mousePlace.t1 = pick.time;

      try { canvas.setPointerCapture(e.pointerId); } catch {}
    }
  });

  canvas.addEventListener("pointermove", (e) => {
    if (!mousePlace.active) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const pick = pickLaneAndTime(mx, my);
    if (!pick) return;

    mousePlace.t1 = pick.time;
  });

  canvas.addEventListener("pointerup", (e) => {
    if (!mousePlace.active) return;
    if (e.button !== 0) return;

    const lane = mousePlace.lane;
    const t0 = mousePlace.t0;
    const t1 = mousePlace.t1;

    mousePlace.active = false;
    mousePlace.lane = -1;

    const dur = Math.abs(t1 - t0);
    if (dur < HOLD_TAP_THRESHOLD) addTap(lane, t0);
    else addHold(lane, t0, t1);
  });

  canvas.addEventListener("pointercancel", () => {
    mousePlace.active = false;
    mousePlace.lane = -1;
  });

  canvas.addEventListener("wheel", (e) => {
    if (!audioBuffer) return;
    if (!editorActive) return;

    e.preventDefault();

    const t = getTrackTime();
    const sens = 1.15;
    
    // нормальный режим: колесо вверх = время вперед
    // инвертированный: колесо вверх = время назад
    let delta = e.deltaY;
    if (editorSettings.wheelDirection === 'inverted') {
      delta = -delta;
    }
    const dt = (delta / SCROLL_SPEED_PX_PER_SEC) * sens;
    let next = t + dt;

    if (getSnapStep() > 0){
      next = snapTime(next);
    }

    setTrackTime(next);
  }, { passive: false });

  canvas.addEventListener('dragover', (e) => {
    e.preventDefault();
    canvas.style.outline = '2px solid var(--accent)';
  });

  canvas.addEventListener('dragleave', () => {
    canvas.style.outline = '';
  });

  canvas.addEventListener('drop', async (e) => {
    e.preventDefault();
    canvas.style.outline = '';
    
    const file = e.dataTransfer.files[0];
    if (file && (file.type.includes('audio') || file.name.match(/\.(mp3|ogg|flac|wav|m4a|aac|wma)$/i))) {
      const dt = new DataTransfer();
      dt.items.add(file);
      audioFile.files = dt.files;
      audioFile.dispatchEvent(new Event('change'));
    }
  });

  audioFile.addEventListener("change", async () => {
    const file = audioFile.files && audioFile.files[0];
    if (!file) return;

    try{
      await loadAudio(file);
    }catch (err){
      console.error(err);
      alert("Couldn't decode audio. Try another file format.");
    }
  });

  playBtn.addEventListener("click", togglePlay);

  stopBtn.addEventListener("click", () => {
    stopPlayback(false);
    setTrackTime(0);
  });

  playSpeed.addEventListener("change", () => {
    if (isPlaying) {
      stopPlayback(true);
      startPlayback();
    }
  });

  exportBtn.addEventListener("click", exportSongJson);

  clearBtn.addEventListener("click", () => {
    if (!confirm("Clear all notes?")) return;
    pushUndo();
    notes = [];
    updateStatsUI();
  });

  quantizeBtn.addEventListener("click", () => {
    const step = getSnapStep();
    if (step <= 0) {
      alert('Set BPM and snap first!');
      return;
    }
    
    pushUndo();
    notes = notes.map(n => ({
      ...n,
      time: snapTime(n.time)
    }));
    sortNotes();
  });

  scrub.addEventListener("input", () => {
    const t = parseFloat(scrub.value) || 0;
    setTrackTime(t);
  });

  importBtn.addEventListener("click", () => importFile.click());

  importFile.addEventListener("change", async () => {
    const f = importFile.files && importFile.files[0];
    if (!f) return;

    const text = await f.text();
    importSongJsonText(text);
    importFile.value = "";
  });

  homeButton.addEventListener("click", () => {
    if (confirm('Reset to new chart? Unsaved changes will be lost.')) {
      notes = [];
      titleInput.value = '';
      artistInput.value = '';
      bpmInput.value = '';
      difficultyInput.value = '3';
      leadInInput.value = '1.00';
      audioFile.value = '';
      enableControls(false);
      updateStatsUI();
    }
  });

  // модалка настроек
  settingsBtn.addEventListener("click", () => {
    settingsModal.classList.add("active");
    updateSettingsUI(); // обновляем UI перед показом
  });

  closeSettingsBtn.addEventListener("click", () => {
    settingsModal.classList.remove("active");
  });

  settingsModal.addEventListener("click", (e) => {
    if (e.target === settingsModal) {
      settingsModal.classList.remove("active");
    }
  });

  // обработчики настроек

  document.querySelectorAll('.keybind-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const lane = parseInt(e.target.dataset.lane);
      
      if (listeningForLane === lane) {
        listeningForLane = -1;
        e.target.style.background = '';
        return;
      }
      
      document.querySelectorAll('.keybind-btn').forEach(b => {
        b.style.background = '';
      });
      
      listeningForLane = lane;
      e.target.style.background = 'rgba(106,166,255,0.3)';
      e.target.textContent = 'Press any key...';
    });
  });

  document.addEventListener('keydown', (e) => {
    if (listeningForLane !== -1) {
      e.preventDefault();
      
      const keyCode = e.code;
      
      if (keyCode.startsWith('Key') || keyCode === 'Space' || keyCode.startsWith('Digit')) {
        editorSettings.keybinds[listeningForLane] = keyCode;
        updateSettingsUI();
        saveSettings();
        
        listeningForLane = -1;
        document.querySelectorAll('.keybind-btn').forEach(b => {
          b.style.background = '';
        });
      }
    }
  });

  document.getElementById('noteSpeed')?.addEventListener('input', (e) => {
    editorSettings.noteSpeed = parseInt(e.target.value);
    document.getElementById('speedValue').textContent = `${editorSettings.noteSpeed}px/s`;
    saveSettings();
  });

  document.getElementById('scrollDir')?.addEventListener('change', (e) => {
    editorSettings.scrollDirection = e.target.value;
    saveSettings();
  });

  document.getElementById('wheelDir')?.addEventListener('change', (e) => {
    editorSettings.wheelDirection = e.target.value;
    saveSettings();
  });

  document.getElementById('audioOffset')?.addEventListener('input', (e) => {
    editorSettings.audioOffset = parseInt(e.target.value);
    document.getElementById('offsetValue').textContent = `${editorSettings.audioOffset}ms`;
    saveSettings();
  });

  document.getElementById('hitlinePos')?.addEventListener('input', (e) => {
    editorSettings.hitlinePos = parseFloat(e.target.value);
    HITLINE_Y_FRAC = editorSettings.scrollDirection === 'up' 
      ? 1 - editorSettings.hitlinePos 
      : editorSettings.hitlinePos;
    saveSettings();
  });

  document.getElementById('resetSettingsBtn')?.addEventListener('click', () => {
    editorSettings = {
      keybinds: ['KeyS', 'KeyD', 'KeyJ', 'KeyK'],
      noteSpeed: 520,
      scrollDirection: 'down',
      wheelDirection: 'normal',
      hitlinePos: 0.78,
      audioOffset: 0
    };
    updateSettingsUI();
    saveSettings();
  });

  document.getElementById('exportSettingsBtn')?.addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(editorSettings, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'terrariff_editor_settings.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('importSettingsBtn')?.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const text = await file.text();
      try {
        const imported = JSON.parse(text);
        editorSettings = { ...editorSettings, ...imported };
        updateSettingsUI();
        saveSettings();
      } catch (err) {
        alert('Invalid settings file!');
      }
    };
    
    input.click();
  });

  // инициализация
  enableControls(false);
  loadSettings();
  loadAutoSave();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
